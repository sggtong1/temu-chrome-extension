<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Temu 数据采集</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- ============ 顶栏 ============ -->
    <header class="topbar">
      <div class="brand">
        <span class="logo">🛒</span>
        <div class="brand-text">
          <div class="brand-title">Temu 数据采集</div>
          <div class="brand-sub">v<span id="version">1.0.0</span></div>
        </div>
      </div>

      <div class="account-switch">
        <span class="account-name" id="account-name">未绑定 ERP</span>
        <!-- ERP 网关已固定为 Tailscale 默认值,配置入口对客户隐藏。
             dev 需切地址时:DevTools 控制台 chrome.storage.local.set({apiUrl:'...'}),
             或临时去掉下面的 hidden 重开此 modal。 -->
        <button class="account-caret" id="btn-switch-account" title="切换账号" hidden>▾</button>
      </div>

      <div class="topbar-right">
        <span class="custody-pill" id="custody-pill">未配置</span>
      </div>
    </header>

    <!-- ============ 托管模式 Tab ============ -->
    <nav class="custody-tabs">
      <button class="custody-tab active" data-custody="full">Temu 全托</button>
      <button class="custody-tab" data-custody="semi">Temu 半托</button>
    </nav>

    <!-- ============ 主体：左模块树 + 右进度区 ============ -->
    <main class="main">
      <!-- 左：模块列表 -->
      <aside class="sidebar">
        <ul class="module-list" id="module-list">
          <!-- rendered by JS -->
        </ul>

      </aside>

      <!-- 右：进度与日志 -->
      <section class="content">
        <!-- 操作栏 -->
        <div class="action-bar">
          <button class="btn-primary" id="btn-fetch">手动获取</button>
          <span class="hint-inline">
            <span class="hint-dot" id="online-dot" title="登录健康度"></span>
            <a class="hint-link" id="link-online">在线情况</a>
          </span>
          <div class="flex-spacer"></div>
          <label class="check-row">
            <input type="checkbox" id="only-failed" />
            <span>仅看失败</span>
          </label>
          <button class="icon-btn" id="btn-log" title="操作日志">📋</button>
          <button class="icon-btn" id="btn-refresh" title="刷新">↻</button>
        </div>

        <!-- ============ 引导:账号匹配 + 区域授权(开屏 gating)============ -->
        <section class="onboard-view" id="onboard-view" hidden>
          <ol class="onboard-steps">
            <li class="onboard-step" data-step="match">
              <span class="onboard-icon idle" id="oi-match">1</span>
              <span class="onboard-label" id="ol-match">账号匹配中…</span>
            </li>
            <li class="onboard-step" data-step="global">
              <span class="onboard-icon idle" id="oi-global">2</span>
              <span class="onboard-label" id="ol-global">等待全球授权</span>
            </li>
            <li class="onboard-step" data-step="eu">
              <span class="onboard-icon idle" id="oi-eu">3</span>
              <span class="onboard-label" id="ol-eu">等待欧区授权</span>
            </li>
            <li class="onboard-step" data-step="us">
              <span class="onboard-icon idle" id="oi-us">4</span>
              <span class="onboard-label" id="ol-us">等待美国授权</span>
            </li>
          </ol>
          <div class="onboard-tip" id="onboard-tip"><!-- rendered by JS --></div>
        </section>

        <!-- 进度树 -->
        <div class="progress-area" id="progress-area">
          <!-- rendered by JS -->
        </div>

        <!-- 空状态（无任务） -->
        <div class="empty-state" id="empty-state" hidden>
          <div class="empty-illust">📭</div>
          <div class="empty-title">还没有任务</div>
          <div class="empty-sub">先选择左侧报告类型，再点"手动获取"</div>
        </div>
      </section>
    </main>

    <!-- ============ 底状态栏 ============ -->
    <footer class="footer">
      <span class="stat">
        <span class="dot dot-ok" id="dot-server"></span>
        服务器 <span id="server-host">未连</span>
      </span>
      <span class="stat">待派单 <b id="pending-tasks">0</b></span>
      <span class="stat">上次同步 <b id="last-sync">—</b></span>
      <div class="flex-spacer"></div>
    </footer>
  </div>

  <!-- ============ 操作日志 Modal ============ -->
  <div class="modal-mask" id="log-modal" hidden>
    <div class="modal">
      <header class="modal-head">
        <h3>操作日志</h3>
        <button class="modal-close" id="modal-close">×</button>
      </header>
      <div class="modal-stats">
        共 <b id="log-total">0</b> 条数据，距离下次更新还有
        <b id="log-countdown">—</b> 秒
      </div>
      <div class="modal-body">
        <table class="log-table">
          <thead>
            <tr>
              <th>操作内容</th>
              <th class="r">操作时间</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
      <footer class="modal-foot">
        <button class="btn-secondary" id="btn-close-modal">关闭</button>
      </footer>
    </div>
  </div>

  <!-- ============ 在线情况 弹出卡（小气泡） ============ -->
  <div class="popover" id="online-pop" hidden>
    <header class="pop-head">
      <span>Temu 后台在线情况</span>
      <button class="modal-close" id="online-pop-close">×</button>
    </header>
    <div class="pop-body" id="online-pop-body">
      <div class="hint-row">检测中…</div>
    </div>
    <div class="pop-foot">
      <span class="hint">凭证从浏览器 cookie 读取，登录 / 退出 Temu 即时生效</span>
      <button class="btn-secondary" id="online-pop-refresh">重新检测</button>
    </div>
  </div>

  <!-- ============ 手动获取 Modal ============ -->
  <div class="modal-mask" id="manual-fetch-modal" hidden>
    <div class="modal modal-manual">
      <header class="modal-head">
        <h3>手动获取</h3>
        <button class="modal-close" id="manual-fetch-close">×</button>
      </header>
      <div class="modal-body modal-pad manual-form">
        <div class="manual-form-row">
          <label class="manual-label" for="manual-shop">店铺:</label>
          <select class="form-input manual-select" id="manual-shop"></select>
        </div>
        <div class="manual-form-row manual-form-row-top">
          <label class="manual-label">报告类型:</label>
          <div class="manual-report-list" id="manual-report-types"></div>
        </div>
        <div class="manual-form-row manual-form-row-top">
          <label class="manual-label">时间范围:</label>
          <div class="manual-date-box">
            <div class="manual-date-fields">
              <input class="form-input manual-date-input" id="manual-date-from" type="date" />
              <span class="manual-date-sep">至</span>
              <input class="form-input manual-date-input" id="manual-date-to" type="date" />
            </div>
            <div class="manual-shortcuts">
              <button type="button" class="manual-shortcut" data-manual-range="today">今天</button>
              <button type="button" class="manual-shortcut" data-manual-range="7d">近 7 天</button>
              <button type="button" class="manual-shortcut" data-manual-range="15d">近 15 天</button>
              <button type="button" class="manual-shortcut" data-manual-range="30d">近 30 天</button>
            </div>
            <div class="manual-range-hint">单次时间范围最长 31 天</div>
          </div>
        </div>
        <div class="form-hint err" id="manual-fetch-error"></div>
      </div>
      <footer class="modal-foot">
        <button class="btn-secondary" id="manual-fetch-cancel">取消</button>
        <button class="btn-primary" id="manual-fetch-submit">确定</button>
      </footer>
    </div>
  </div>

  <!-- ============ 切换账号 Modal ============ -->
  <div class="modal-mask" id="account-modal" hidden>
    <div class="modal modal-small">
      <header class="modal-head">
        <h3>切换 / 绑定 ERP 账号</h3>
        <button class="modal-close" id="account-modal-close">×</button>
      </header>
      <div class="modal-body modal-pad">
        <label class="form-label">ERP API 地址</label>
        <input id="cfg-api-url" type="url" class="form-input" placeholder="https://api.duoshou.local" />
        <label class="form-label">访问令牌</label>
        <input id="cfg-token" type="password" class="form-input" placeholder="bearer token" />
        <div class="form-hint" id="cfg-status"></div>
      </div>
      <footer class="modal-foot">
        <button class="btn-secondary" id="cfg-cancel">取消</button>
        <button class="btn-primary" id="cfg-save">保存并测试</button>
      </footer>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
